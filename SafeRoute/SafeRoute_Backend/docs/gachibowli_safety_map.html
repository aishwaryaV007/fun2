    allEdges.forEach((edge) => {
        
        let edgeColor = '#ef4444'; // default red
        if (edge.safety_score >= 80) edgeColor = '#10b981'; // Green
        else if (edge.safety_score >= 60) edgeColor = '#facc15'; // Yellow
        else if (edge.safety_score >= 40) edgeColor = '#f97316'; // Orange

        // Draw Polyline for the path joining the nodes
        const pline = L.polyline(edge.coords, {
            color: edgeColor,
            weight: 3,
            opacity: 0.85,
            lineCap: 'round',
            lineJoin: 'round'
        }).addTo(map);

        // Bind popup explicitly
        const popupContent = `
            <div style="font-size: 14px;"><strong>${edge.name}</strong></div>
            <div style="font-size: 12px; color: #475569; text-transform: capitalize;">TYPE: ${edge.road_type}</div>
            <div class="score-badge" style="color:${edgeColor}; border: 1px solid ${edgeColor};">Safety: ${edge.safety_score.toFixed(1)}/100</div>
        `;
        pline.bindPopup(popupContent);

        // --- RENDER BLUE JUNCTION SPOTS (Start/End points) ---
        // Render tiny node junction spots at each node coordinate
        const circleOptions = {
            color: '#3b82f6',
            fillColor: '#60a5fa',
            fillOpacity: 0.8,
            radius: 2,
            weight: 1
        };
        
        L.circleMarker(edge.start, circleOptions).addTo(map);
    });
